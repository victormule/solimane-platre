<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abounaddara-CNRS-2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw; height: 100vh;
      max-width: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Cormorant Garamond', serif;
      cursor: none;
    }

    #overlay-canvas {
      position: fixed; inset: 0;
      z-index: 10; pointer-events: none;
    }

    #cursor {
      position: fixed; left: 50%; top: 50%;
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,248,220,0.38);
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 30;
      transition: width .22s ease, height .22s ease, background .22s ease,
                  box-shadow .22s ease, opacity .22s ease;
    }
    #cursor.active {
      width: 14px; height: 14px;
      background: rgba(255,220,120,0.92);
      box-shadow: 0 0 0 4px rgba(255,220,120,0.22),
                  0 0 18px rgba(255,200,80,0.6),
                  0 0 36px rgba(255,170,40,0.3);
      animation: cursor-pulse 0.9s ease-in-out infinite;
    }
    @keyframes cursor-pulse {
      0%   { transform: translate(-50%,-50%) scale(1);    box-shadow: 0 0 0 4px rgba(255,220,120,0.22), 0 0 18px rgba(255,200,80,0.6),  0 0 36px rgba(255,170,40,0.3); }
      50%  { transform: translate(-50%,-50%) scale(1.55); box-shadow: 0 0 0 10px rgba(255,220,120,0.08), 0 0 30px rgba(255,200,80,0.45), 0 0 60px rgba(255,170,40,0.18); }
      100% { transform: translate(-50%,-50%) scale(1);    box-shadow: 0 0 0 4px rgba(255,220,120,0.22), 0 0 18px rgba(255,200,80,0.6),  0 0 36px rgba(255,170,40,0.3); }
    }

    .scene {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      overflow: hidden; z-index: 0;
    }
    #bgVideo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain; object-position: center center;
      padding: 2vh 2vw;
      filter: brightness(0.88) contrast(1.04);
    }

    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 11; opacity: 0.032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      animation: grain 0.5s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{background-position:0 0} 10%{background-position:-5% -10%}
      20%{background-position:-15% 5%} 30%{background-position:7% -25%}
      40%{background-position:-5% 25%} 50%{background-position:-15% 10%}
      60%{background-position:15% 0}   70%{background-position:0 15%}
      80%{background-position:3% 35%}  90%{background-position:-10% 10%}
    }

    #site-title {
      position: fixed; top: 3.2vh; left: 3.5vw;
      z-index: 25; pointer-events: none;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.2vw, 0.92rem);
      font-weight: 400; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(210,175,90,0);
    }
    #site-title .char {
      display: inline-block; opacity: 0; transform: translateY(6px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #site-title .sep {
      display: inline-block; opacity: 0; margin: 0 0.4em;
      transition: opacity 0.8s ease;
    }

    .subtitle {
      position: fixed; z-index: 20;
      color: #fff; font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 1.9vw, 30px); font-style: italic; font-weight: 300;
      letter-spacing: 0.03em; line-height: 1.9; text-align: left;
      max-width: 44ch; white-space: pre-wrap; opacity: 0;
      transition: opacity 0.75s ease; pointer-events: none;
      text-shadow: 0 0 24px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,.95), 0 2px 5px rgba(0,0,0,.85);
    }
    #subtitle-1 { left: 5vw;  bottom: 9vh; }
    #subtitle-2 { right: 5vw; top: 9vh; text-align: right; }
    #subtitle-3 { left: 58vw; top: 44vh; max-width: 36ch; }
    #subtitle-4 { left: 5vw;  top: 18vh; max-width: 40ch; }

    .hotspot {
      position: absolute; border-radius: 50%;
      cursor: none; z-index: 5;
    }
    .hotspot .label {
      position: absolute; bottom: -30px; left: 50%;
      transform: translateX(-50%); white-space: nowrap;
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px;
      color: rgba(255,235,180,0.9); opacity: 0;
      transition: opacity 0.3s ease; pointer-events: none; letter-spacing: 0.06em;
    }
    .hotspot:hover .label { opacity: 1; }

    /* Hotspots positionnés dynamiquement par JS via getVideoRect() */
    #face-L2-3, #face-L2-6 { position: absolute; }

    /* Cartels positionnés entièrement par JS en px calculés depuis % fenêtre */
    .face-cartel {
      position: fixed; z-index: 15;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s ease;
    }
    .face-cartel.visible { opacity: 1; }
    .face-cartel svg { display: block; overflow: visible; width: 100%; height: auto; }

    .cartel-path {
      fill: none; stroke: rgba(255,255,255,0.82); stroke-width: 0.7;
      stroke-dasharray: 800; stroke-dashoffset: 800;
      transition: stroke-dashoffset 0.75s cubic-bezier(0.4,0,0.2,1);
    }
    .face-cartel.visible .cartel-path { stroke-dashoffset: 0; }

    .cartel-title {
      fill: #fff; font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      opacity: 0; transition: opacity 0.4s ease 0.6s;
    }
    .face-cartel.visible .cartel-title { opacity: 1; }

    .cartel-body {
      fill: rgba(255,255,255,0.58); font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px; font-style: italic; letter-spacing: 0.05em;
      opacity: 0; transition: opacity 0.4s ease 0.82s;
    }
    .face-cartel.visible .cartel-body { opacity: 1; }

    #start-screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; background: #000; cursor: pointer;
    }
    #start-intro {
      letter-spacing: 0.25em; text-align: center;
    }
    #start-screen .sound-notice {
      font-style: italic; letter-spacing: .18em; text-align: center;
    }
    #start-screen .sound-notice span {
      display: block; margin-top: 4px;
      font-size: clamp(9px,.9vw,11px);
      font-style: normal; letter-spacing: .28em; text-transform: uppercase;
    }
    #start-screen p {
      letter-spacing: .32em; text-transform: uppercase;
      animation: pulse 3s ease-in-out infinite;
    }

    #hint { display: none; }

    #nav-bar {
      position: fixed; z-index: 22;
      pointer-events: none;
      left: 0; top: 0;
    }
    #nav-bar svg { overflow: visible; display: block; }
    .nav-rect-path { fill: none; stroke-linecap: square; }
    .nav-btn-zone  { pointer-events: auto; cursor: none; }
    .nav-btn-label { dominant-baseline: middle; text-anchor: middle; font-weight: 300; text-transform: uppercase; }

    #btn-fs {
      position: fixed; bottom: 20px; right: 24px;
      z-index: 40; background: none; border: none;
      cursor: none; padding: 8px;
      opacity: 0.55;
      transition: opacity 0.25s ease, filter 0.25s ease;
    }
    #btn-fs:hover {
      opacity: 1;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.9));
    }
    #btn-fs svg {
      display: block; width: 20px; height: 20px;
      fill: none; stroke: #fff;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.7} }

    /* ── Écran de blocage portrait (mobile) ── */
    #portrait-lock {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 32px;
    }
    #portrait-lock svg {
      width: 52px; height: 52px;
      fill: none; stroke: rgba(210,175,90,0.85);
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
      animation: rotate-hint 2.8s ease-in-out infinite;
    }
    @keyframes rotate-hint {
      0%,35%  { transform: rotate(0deg); }
      65%,100%{ transform: rotate(90deg); }
    }
    #portrait-lock p {
      font-family: 'Cinzel', serif;
      font-size: clamp(10px, 3.5vw, 14px);
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); text-align: center;
      line-height: 1.8; padding: 0 12vw;
    }
    @media (orientation: portrait) {
      #portrait-lock { display: flex; }
    }
  </style>
</head>
<body>

<div id="portrait-lock">
  <svg viewBox="0 0 24 24">
    <rect x="5" y="2" width="14" height="20" rx="2"/>
    <line x1="9" y1="22" x2="9" y2="2"/>
    <polyline points="6 5 9 2 12 5"/>
  </svg>
  <p>Veuillez pivoter<br>votre appareil à l'horizontal</p>
</div>
<canvas id="overlay-canvas"></canvas>
<div id="cursor"></div>
<div class="grain"></div>
<div id="site-title"></div>

<div class="subtitle" id="subtitle-1"></div>
<div class="subtitle" id="subtitle-2"></div>
<div class="subtitle" id="subtitle-3"></div>
<div class="subtitle" id="subtitle-4"></div>

<div class="scene">
  <video id="bgVideo" preload="auto" playsinline disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback">
    <source src="Soliman.mp4" type="video/mp4">
  </video>
  <div class="hotspot" id="face-L2-3" data-start="3" data-end="20" data-name="Caleb">
    <span class="label"></span>
  </div>
  <div class="hotspot" id="face-L2-6" data-start="20" data-end="36" data-name="La fillette">
    <span class="label"></span>
  </div>
</div>

<!-- Cartel Caleb -->
<div class="face-cartel" id="cartel-caleb">
  <svg viewBox="0 0 200 125">
    <path class="cartel-path" d="M 100 0 L 100 22 L 10 22 L 10 115 L 190 115 L 190 22 L 100 22"/>
    <text class="cartel-title" x="22" y="43">Caleb</text>
    <text class="cartel-body"  x="22" y="63">Témoin, Alep — 1895</text>
    <text class="cartel-body"  x="22" y="79">Archives Abounaddara</text>
    <text class="cartel-body"  x="22" y="95">CNRS — 2026</text>
  </svg>
</div>

<!-- Cartel La fillette -->
<div class="face-cartel" id="cartel-fillette">
  <svg viewBox="0 0 200 125">
    <path class="cartel-path" d="M 100 0 L 100 22 L 10 22 L 10 115 L 190 115 L 190 22 L 100 22"/>
    <text class="cartel-title" x="22" y="43">La fillette</text>
    <text class="cartel-body"  x="22" y="63">Identité inconnue — 1873</text>
    <text class="cartel-body"  x="22" y="79">Archives Abounaddara</text>
    <text class="cartel-body"  x="22" y="95">CNRS — 2026</text>
  </svg>
</div>

<div id="hint"></div>
<div id="nav-bar"></div>
<button id="btn-fs" title="Plein écran">
  <svg id="icon-fs-enter" viewBox="0 0 24 24">
    <polyline points="15 3 21 3 21 9"/>
    <polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/>
    <line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
  <svg id="icon-fs-exit" viewBox="0 0 24 24" style="display:none">
    <polyline points="4 14 10 14 10 20"/>
    <polyline points="20 10 14 10 14 4"/>
    <line x1="10" y1="14" x2="3" y2="21"/>
    <line x1="21" y1="3" x2="14" y2="10"/>
  </svg>
</button>
<div id="start-screen">
  <div id="start-intro"></div>
  <div class="sound-notice">
    Cette expérience est bien meilleure avec le son
    <span>&#9834; &nbsp; casque recommandé</span>
  </div>
  <p id="start-cta">cliquez pour commencer</p>
</div>

<!-- Sons narratifs -->
<audio id="snd-perturbe" src="perturbe.mp3" preload="auto"></audio>
<audio id="snd-candice"  src="Candice2.mp3" preload="auto"></audio>
<audio id="snd-delicat"  src="delicat.mp3"  preload="auto"></audio>
<audio id="snd-pratique" src="pratique.mp3" preload="auto"></audio>

<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║                  ★  CONFIGURATION  ★                        ║
   ║  Toutes les variables réglables sont ici, dans ce bloc.      ║
   ║  Modifiez uniquement cette section — ne touchez pas au reste.║
   ╚══════════════════════════════════════════════════════════════╝ */

const CONFIG = {

  /* ╔══════════════════════════════════════════════════════╗
     ║  1. VOLUMES  (0.0 = silence  →  1.0 = plein volume)  ║
     ╚══════════════════════════════════════════════════════╝ */

  VOL_PUBLIC:         0.62,  // bruit de fond en boucle permanente
  VOL_WHISPER:        0.14,  // chuchotement ponctuel
  VOL_PERTURBE:       1.0,   // 1er témoignage narratif
  VOL_CANDICE:        1.0,   // 2e témoignage narratif
  VOL_DELICAT:        1.0,   // 3e témoignage narratif
  VOL_PRATIQUE:       1.0,   // 4e témoignage narratif
  VOL_VIDEO:          0.18,  // volume interne de la vidéo interactive
  VOL_DUCK_AMBIENT:   0.08,  // fond quand une vidéo joue (ducking)
  VOL_DUCK_NARR:      0.08,  // narratifs si la vidéo joue par-dessus (ducking fort)

  /* ╔══════════════════════════════════════════════════════╗
     ║  2. FONDUS  (millisecondes)                          ║
     ╚══════════════════════════════════════════════════════╝ */

  FADE_PUBLIC_IN:     3500,
  FADE_DUCK_DOWN:     1000,
  FADE_DUCK_UP:       1400,
  FADE_NARR_IN:        800,
  FADE_NARR_OUT:      1400,
  FADE_VIDEO_IN:       600,
  FADE_VIDEO_OUT:      800,

  /* ╔══════════════════════════════════════════════════════╗
     ║  3. CHUCHOTEMENT  (millisecondes)                    ║
     ╚══════════════════════════════════════════════════════╝ */

  WHISPER_FIRST:      30000,
  WHISPER_MIN:        35000,
  WHISPER_MAX:        70000,
  WHISPER_FADE_IN:     1800,
  WHISPER_FADE_OUT:    2200,

  /* ╔══════════════════════════════════════════════════════╗
     ║  4. TORCHE                                           ║
     ╚══════════════════════════════════════════════════════╝ */

  TORCH_RADIUS:        0.43, // fraction de min(largeur, hauteur) — ex: 0.13 = 13%
  TORCH_GROW_DURATION: 26000,
  TORCH_FOLLOW_SPEED:  0.068,
  TORCH_HINT_DELAY:    12000,

  /* ╔══════════════════════════════════════════════════════╗
     ║  5. VIDÉO INTERACTIVE                                ║
     ╚══════════════════════════════════════════════════════╝ */

  VIDEO_BRIGHTNESS:    0.88,
  VIDEO_CONTRAST:      1.04,
  VIDEO_PADDING_H:     '2vh',
  VIDEO_PADDING_V:     '2vw',
  VIDEO_STOP_DELAY:     800,

  /* ╔══════════════════════════════════════════════════════╗
     ║  6. GRAIN CINÉMATIQUE                                ║
     ╚══════════════════════════════════════════════════════╝ */

  GRAIN_OPACITY:       0.052,
  GRAIN_SIZE:          '200px 200px',
  GRAIN_SPEED:         '0.5s',

  /* ╔══════════════════════════════════════════════════════╗
     ║  7. CURSEUR PULSANT                                  ║
     ╚══════════════════════════════════════════════════════╝ */

  CURSOR_REST_SIZE:    '5px',
  CURSOR_PULSE_SIZE:   '14px',
  CURSOR_PULSE_SCALE:   1.75,
  CURSOR_PULSE_SPEED:  '0.9s',

  /* ╔══════════════════════════════════════════════════════╗
     ║  8. SOUS-TITRES                                      ║
     ╚══════════════════════════════════════════════════════╝ */

  SUBTITLE_FONT:        'clamp(12px, min(2.3vw, 2.9vh), 38px)', // suit largeur ET hauteur
  SUBTITLE_LINE_HEIGHT: '1.4',
  SUBTITLE_MAX_WIDTH:   '52ch',
  SUBTITLE_MAX_WIDTH_3: '36ch',
  SUBTITLE_FADE:        '0.75s',

  SUBTITLE_TEXT_1:
    "Je ne sais pas pourquoi.. ça m'a...\n" +
    "ça m'a autant perturbé.\n" +
    "Mais je sais que ça m'a perturbé.",

  SUBTITLE_TEXT_2:
    "Voilà. Ce qui s'est passé à cette époque là,\n" +
    "ça nous concerne pas...\n" +
    "Enfin, si...\n" +
    "Ça nous concerne.\n" +
    "Ça nous concerne, c'est notre histoire.",

  SUBTITLE_TEXT_3:
    "Tout était aussi délicat..\n" +
    "un peu sensible à traiter.\n" +
    "Que vraiment le choix des mots était important.",

  SUBTITLE_TEXT_4:
    "Ça nécessite de constamment faire\n" +
    "un travail de réflexivité.\n" +
    "Et j'ai aussi l'impression qu'il y a\n" +
    "une forte volonté et un fort besoin\n" +
    "de vérité, d'honnêteté\n" +
    "et de sincérité dans les pratiques.",

  SUBTITLE_HOLD_1:     3000,
  SUBTITLE_HOLD_2:     3500,
  SUBTITLE_HOLD_3:     3600,
  SUBTITLE_HOLD_4:     4000,

  /* ╔══════════════════════════════════════════════════════╗
     ║  9. TYPING                                           ║
     ╚══════════════════════════════════════════════════════╝ */

  TYPING_SPEED:        1.4,

  /* ╔══════════════════════════════════════════════════════╗
     ║  10. TITRE HAUT GAUCHE                               ║
     ╚══════════════════════════════════════════════════════╝ */

  TITLE_TEXT:          'Abounaddara — CNRS — 2026',
  TITLE_FONT:          'clamp(0.6rem, 1.2vw, 0.92rem)',
  TITLE_COLOR:         'rgba(210,175,90,1)',
  TITLE_GLOW:          'rgba(210,160,50,0.25)',
  TITLE_CHAR_DELAY:     55,
  TITLE_INITIAL_DELAY:  800,

  /* ╔══════════════════════════════════════════════════════╗
     ║  11. CARTELS DES VISAGES                             ║
     ╚══════════════════════════════════════════════════════╝ */

  CARTEL_FONT_TITLE:        13,
  CARTEL_FONT_TITLE_COLOR:  'rgba(255,255,255,1)',
  CARTEL_FONT_TITLE_FAMILY: 'Helvetica Neue, Arial, sans-serif',
  CARTEL_FONT_BODY:         11,
  CARTEL_FONT_BODY_COLOR:   'rgba(255,255,255,0.58)',
  CARTEL_FONT_BODY_FAMILY:  'Cormorant Garamond, Georgia, serif',
  CARTEL_OFFSET_Y:          0.015, // décalage vertical global (fraction hauteur fenêtre)
  CARTEL_WIDTH:             0.11,  // largeur (fraction largeur fenêtre)
  CARTEL_STROKE_COLOR:      'rgba(255,255,255,0.82)',
  CARTEL_STROKE_WIDTH:      0.7,
  CARTEL_DRAW_SPEED:        '0.75s',
  CARTEL_FADE_SPEED:        '0.5s',

  // Décalage individuel de chaque cartel (fraction de la largeur/hauteur fenêtre)
  // + = droite ou bas  /  - = gauche ou haut
  CARTEL_CALEB_OFFSET_X:    -0.021,     // ex: -0.02 décale de 2vw à gauche
  CARTEL_CALEB_OFFSET_Y:    0,     // ex:  0.01 descend de 1vh
  CARTEL_FILLETTE_OFFSET_X: -0.008,
  CARTEL_FILLETTE_OFFSET_Y: 0,

  /* ╔══════════════════════════════════════════════════════╗
     ║  12. LABELS AU SURVOL DES HOTSPOTS                   ║
     ╚══════════════════════════════════════════════════════╝ */

  LABEL_FONT_SIZE:     '12px',
  LABEL_COLOR:         'rgba(255,235,180,0.9)',
  LABEL_OFFSET_Y:      '-30px',

  /* ╔══════════════════════════════════════════════════════╗
     ║  13. ÉCRAN DE DÉMARRAGE                              ║
     ╚══════════════════════════════════════════════════════╝ */

  // Phrase d'introduction
  START_INTRO_TEXT:    'Bienvenue',
  START_INTRO_FONT:    'clamp(1.4rem, 3.5vw, 3.2rem)',
  START_INTRO_COLOR:   'rgba(210,175,90,0.85)',
  START_INTRO_FAMILY:  'Cormorant Garamond, serif',

  // Texte "son conseillé"
  START_NOTICE_TEXT:   'Cette expérience est bien meilleure avec le son',
  START_NOTICE_FONT:   'clamp(11px, 1.1vw, 14px)',
  START_NOTICE_COLOR:  'rgba(255,255,255,.22)',
  START_NOTICE_FAMILY: 'Cormorant Garamond, serif',
  START_NOTICE_SUB:    '♪  casque recommandé',
  START_NOTICE_SUB_COLOR: 'rgba(255,220,120,.28)',

  // Bouton "cliquer pour commencer"
  START_CTA_TEXT:      'cliquez pour commencer',
  START_CTA_FONT:      '0.75rem',
  START_CTA_COLOR:     'rgba(255,255,255,.38)',
  START_CTA_FAMILY:    'Cinzel, serif',

  /* ╔══════════════════════════════════════════════════════╗
     ║  14. HINT BAS DE PAGE                                ║
     ╚══════════════════════════════════════════════════════╝ */

  HINT_TEXT:           'Déplacez la lumière — Cliquez sur un visage',
  HINT_FONT_SIZE:      '10px',
  HINT_COLOR:          'rgba(255,255,255,0.35)',

/* ══════════════════════════════════════════════════
   getVideoRect() — zone réelle de la vidéo en px
   (object-fit:contain + padding)
══════════════════════════════════════════════════ */
function getVideoRect(){
  var vid = document.getElementById('bgVideo');
  var cs  = getComputedStyle(vid);
  var padTop    = parseFloat(cs.paddingTop)    || 0;
  var padRight  = parseFloat(cs.paddingRight)  || 0;
  var padBottom = parseFloat(cs.paddingBottom) || 0;
  var padLeft   = parseFloat(cs.paddingLeft)   || 0;
  var boxW = vid.clientWidth  - padLeft - padRight;
  var boxH = vid.clientHeight - padTop  - padBottom;
  var vidW = vid.videoWidth  || vid.clientWidth;
  var vidH = vid.videoHeight || vid.clientHeight;
  var vidRatio = vidW / vidH;
  var boxRatio = boxW / boxH;
  var renderW, renderH;
  if(vidRatio > boxRatio){ renderW = boxW; renderH = boxW / vidRatio; }
  else                   { renderH = boxH; renderW = boxH * vidRatio; }
  return {
    x: padLeft + (boxW - renderW) / 2,
    y: padTop  + (boxH - renderH) / 2,
    w: renderW,
    h: renderH
  };
}

function updateFaceHover(){
  var vr  = getVideoRect();
  var W   = window.innerWidth, H = window.innerHeight;
  var torchOn    = torchBaseRadius > 5;
  var cartelW    = CONFIG.CARTEL_WIDTH    * W;
  var cartelOffY = CONFIG.CARTEL_OFFSET_Y * H;
  var anyHovered = false;
  var keys = Object.keys(FACES);
  for(var k = 0; k < keys.length; k++){
    var face = FACES[keys[k]];
    var cx = vr.x + face.xPct * vr.w;
    var cy = vr.y + face.yPct * vr.h;
    var rx = face.rx * vr.w;
    var ry = face.ry * vr.h;
    var dx = (mouseX - cx) / rx, dy = (mouseY - cy) / ry;
    face.hovered = (dx*dx + dy*dy) <= 1.0;

    var showCartel = torchOn && face.hovered && !videoPlaying;
    var offX = (face.offsetX || 0) * W;   // fraction largeur → px
    var offY = (face.offsetY || 0) * H;   // fraction hauteur → px
    face.cartel.style.left  = (cx - cartelW / 2 + offX) + 'px';
    face.cartel.style.top   = (cy + ry + cartelOffY + offY) + 'px';
    face.cartel.style.width = cartelW + 'px';
    face.cartel.classList.toggle('visible', showCartel);

    if(torchOn && face.hovered) anyHovered = true;
  }
  cursorEl.classList.toggle('active', anyHovered);
}

var O = {
  b1:{s:0.00044,p:Math.random()*6.28,a:0.062}, b2:{s:0.00071,p:Math.random()*6.28,a:0.038},
  f1:{s:0.0088, p:Math.random()*6.28,a:0.024}, f2:{s:0.0141, p:Math.random()*6.28,a:0.017},
  f3:{s:0.0229, p:Math.random()*6.28,a:0.011}, f4:{s:0.0373, p:Math.random()*6.28,a:0.006},
  dx:{s:0.00058,p:Math.random()*6.28,a:3.2},   dy:{s:0.00074,p:Math.random()*6.28,a:2.5},
  w: {s:0.00041,p:Math.random()*6.28,a:1.0}
};
function osc(o,t){ return Math.sin(t*o.s+o.p)*o.a; }

function safeGrad(x0,y0,r0,x1,y1,r1){
  if([x0,y0,r0,x1,y1,r1].some(function(v){return !isFinite(v)||isNaN(v);})) return null;
  return ctx.createRadialGradient(x0,y0,Math.max(0,r0),x1,y1,Math.max(0.001,r1));
}

function renderTorch(t){
  var W=canvas.width, H=canvas.height;
  torchX += (mouseX-torchX)*CONFIG.TORCH_FOLLOW_SPEED;
  torchY += (mouseY-torchY)*CONFIG.TORCH_FOLLOW_SPEED;
  var active = torchBaseRadius > 5;
  var jx = active ? osc(O.dx,t) : 0, jy = active ? osc(O.dy,t) : 0;
  var cx = torchX+jx, cy = torchY+jy;
  var intensity = 1+osc(O.b1,t)+osc(O.b2,t)+osc(O.f1,t)+osc(O.f2,t)+osc(O.f3,t)+osc(O.f4,t);
  var r = Math.max(0, torchBaseRadius * Math.max(0.72, intensity));
  var warmPulse = osc(O.w,t);

  ctx.clearRect(0,0,W,H); ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  if(r<1) return;

  ctx.globalCompositeOperation='destination-out';
  var r1=r*3.4, g1=safeGrad(cx,cy,0,cx,cy,r1);
  if(g1){g1.addColorStop(0,'rgba(0,0,0,0.28)');g1.addColorStop(0.22,'rgba(0,0,0,0.16)');g1.addColorStop(0.55,'rgba(0,0,0,0.07)');g1.addColorStop(0.82,'rgba(0,0,0,0.02)');g1.addColorStop(1,'rgba(0,0,0,0.00)');ctx.beginPath();ctx.arc(cx,cy,r1,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();}
  var r2=r*2.0, g2=safeGrad(cx,cy,0,cx,cy,r2);
  if(g2){g2.addColorStop(0,'rgba(0,0,0,0.44)');g2.addColorStop(0.35,'rgba(0,0,0,0.28)');g2.addColorStop(0.68,'rgba(0,0,0,0.10)');g2.addColorStop(1,'rgba(0,0,0,0.00)');ctx.beginPath();ctx.arc(cx,cy,r2,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();}
  var g3=safeGrad(cx,cy,0,cx,cy,r);
  if(g3){g3.addColorStop(0,'rgba(0,0,0,0.78)');g3.addColorStop(0.28,'rgba(0,0,0,0.68)');g3.addColorStop(0.58,'rgba(0,0,0,0.42)');g3.addColorStop(0.82,'rgba(0,0,0,0.16)');g3.addColorStop(1,'rgba(0,0,0,0.00)');ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g3;ctx.fill();}
  var rCore=Math.max(1,r*(0.28+Math.abs(osc(O.f1,t))*0.15)), gC=safeGrad(cx,cy,0,cx,cy,rCore);
  if(gC){gC.addColorStop(0,'rgba(0,0,0,0.18)');gC.addColorStop(1,'rgba(0,0,0,0.00)');ctx.beginPath();ctx.arc(cx,cy,rCore,0,Math.PI*2);ctx.fillStyle=gC;ctx.fill();}

  ctx.globalCompositeOperation='source-over';
  var wR=Math.max(1,r*0.62*Math.max(0.55,intensity)), wAlpha=0.048+Math.abs(warmPulse)*0.028;
  var gW=safeGrad(cx,cy,0,cx,cy,wR);
  if(gW){var gb=Math.floor(Math.max(0,Math.min(255,185+warmPulse*14)));gW.addColorStop(0,'rgba(255,'+gb+',70,'+(wAlpha*1.5).toFixed(3)+')');gW.addColorStop(0.45,'rgba(255,170,55,'+wAlpha.toFixed(3)+')');gW.addColorStop(1,'rgba(255,130,20,0.000)');ctx.beginPath();ctx.arc(cx,cy,wR,0,Math.PI*2);ctx.fillStyle=gW;ctx.fill();}

  var vR_in=Math.max(0,r*1.05), vR_out=Math.max(vR_in+1,Math.sqrt(W*W+H*H)*0.72);
  var gV=safeGrad(cx,cy,vR_in,cx,cy,vR_out);
  if(gV){gV.addColorStop(0,'rgba(0,0,0,0.00)');gV.addColorStop(0.2,'rgba(0,0,0,0.18)');gV.addColorStop(0.6,'rgba(0,0,0,0.55)');gV.addColorStop(1,'rgba(0,0,0,0.92)');ctx.fillStyle=gV;ctx.fillRect(0,0,W,H);}
}

/* growTorch — anime torchProgress (fraction), recalcule px à chaque frame */
function growTorch(targetFraction, durationMs){
  var startProgress = torchProgress;
  var diff = targetFraction - startProgress;
  var t0   = performance.now();
  function step(now){
    var p = Math.min((now - t0) / durationMs, 1);
    var e = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2,2)/2;
    torchProgress   = startProgress + diff * e;
    torchBaseRadius = torchProgress * torchRadiusPx();
    if(p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

(function loop(t){ renderTorch(t); requestAnimationFrame(loop); })();

var audioCtx=null, publicSource=null, publicGain=null, whisperBuffer=null;

function getCtx(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function loadBuffer(url){
  var ac = getCtx();
  return fetch(url)
    .then(function(r){ return r.arrayBuffer(); })
    .then(function(ab){ return ac.decodeAudioData(ab); })
    .catch(function(){ return null; });
}

function startPublicLoop(){
  var ac = getCtx();
  loadBuffer('public.mp3').then(function(buf){
    if(!buf) return;
    publicSource = ac.createBufferSource();
    publicSource.buffer = buf; publicSource.loop = true;
    publicGain = ac.createGain();
    publicGain.gain.setValueAtTime(0, ac.currentTime);
    publicGain.gain.linearRampToValueAtTime(CONFIG.VOL_PUBLIC, ac.currentTime + CONFIG.FADE_PUBLIC_IN/1000);
    publicSource.connect(publicGain); publicGain.connect(ac.destination);
    publicSource.start();
  });
}

function spawnWhisper(){
  var ac = getCtx();
  if(!whisperBuffer) return;
  var src  = ac.createBufferSource(); src.buffer = whisperBuffer; src.loop = false;
  var gain = ac.createGain();
  var dur  = whisperBuffer.duration;
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(CONFIG.VOL_WHISPER, ac.currentTime + CONFIG.WHISPER_FADE_IN/1000);
  gain.gain.setValueAtTime(CONFIG.VOL_WHISPER, ac.currentTime + Math.max(0, dur - CONFIG.WHISPER_FADE_OUT/1000));
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + dur);
  src.connect(gain); gain.connect(ac.destination); src.start();
}

function scheduleWhispers(){
  setTimeout(function(){
    spawnWhisper();
    function next(){
      var d = CONFIG.WHISPER_MIN + Math.random()*(CONFIG.WHISPER_MAX - CONFIG.WHISPER_MIN);
      setTimeout(function(){ spawnWhisper(); next(); }, d);
    }
    next();
  }, CONFIG.WHISPER_FIRST);
}

var narrativeEls = [
  { el: document.getElementById('snd-perturbe'), vol: function(){ return CONFIG.VOL_PERTURBE; } },
  { el: document.getElementById('snd-candice'),  vol: function(){ return CONFIG.VOL_CANDICE;  } },
  { el: document.getElementById('snd-delicat'),  vol: function(){ return CONFIG.VOL_DELICAT;  } },
  { el: document.getElementById('snd-pratique'), vol: function(){ return CONFIG.VOL_PRATIQUE; } }
];

function duckAmbient(doDuck, durationMs){
  if(!durationMs) durationMs = CONFIG.FADE_DUCK_UP;
  var ac = getCtx();
  if(!publicGain) return;
  var target = doDuck ? CONFIG.VOL_DUCK_AMBIENT : CONFIG.VOL_PUBLIC;
  publicGain.gain.cancelScheduledValues(ac.currentTime);
  publicGain.gain.setValueAtTime(publicGain.gain.value, ac.currentTime);
  publicGain.gain.linearRampToValueAtTime(target, ac.currentTime + durationMs/1000);
  narrativeEls.forEach(function(item){
    if(item.el.paused) return;
    var targetVol = doDuck ? CONFIG.VOL_DUCK_NARR : item.vol();
    var steps=40, sv=item.el.volume, diff=targetVol-sv, interval=durationMs/steps, n=0;
    var ti = setInterval(function(){
      n++; item.el.volume = Math.max(0, Math.min(1, sv + diff*(n/steps)));
      if(n >= steps) clearInterval(ti);
    }, interval);
  });
}

function fadeInNarr(el, ms, vol){
  var startVol  = videoPlaying ? CONFIG.VOL_DUCK_NARR : 0;
  var targetVol = videoPlaying ? CONFIG.VOL_DUCK_NARR : vol;
  el.volume = startVol;
  el.play().catch(function(){});
  if(videoPlaying) return;
  var steps=50, step=targetVol/steps, n=0;
  var ti = setInterval(function(){
    n++; el.volume = Math.min(targetVol, n*step);
    if(n >= steps) clearInterval(ti);
  }, ms/steps);
}

var sndPerturbe = document.getElementById('snd-perturbe');
var sndCandice  = document.getElementById('snd-candice');
var sndDelicat  = document.getElementById('snd-delicat');
var sndPratique = document.getElementById('snd-pratique');

function fadeInEl(el, ms, vol){
  el.volume=0; el.play().catch(function(){});
  var steps=50, step=vol/steps, n=0;
  var ti = setInterval(function(){
    n++; el.volume = Math.min(vol, n*step);
    if(n >= steps) clearInterval(ti);
  }, ms/steps);
}
function fadeOutEl(el, ms, cb){
  var steps=50, sv=el.volume, step=sv/steps, n=0;
  var ti = setInterval(function(){
    n++; el.volume = Math.max(0, sv - n*step);
    if(n >= steps){ clearInterval(ti); el.pause(); el.currentTime=0; if(cb) cb(); }
  }, ms/steps);
}

});

function stopVideo(){
  returning=true; video.pause();
  duckAmbient(false, CONFIG.FADE_DUCK_UP);
  videoPlaying=false; activeHotspot=null;
  setTimeout(function(){ video.currentTime=0; activeEnd=null; returning=false; }, CONFIG.VIDEO_STOP_DELAY);
}

document.querySelectorAll('.hotspot').forEach(function(hotspot){
  var start = parseFloat(hotspot.dataset.start);
  var end   = parseFloat(hotspot.dataset.end);
  if(isNaN(start)||isNaN(end)) return;
  hotspot.addEventListener('click', function(){
    if(torchBaseRadius < 5) return;
    if(videoPlaying && activeHotspot === hotspot){ stopVideo(); return; }
    returning=false; activeEnd=end; activeHotspot=hotspot; videoPlaying=true;
    duckAmbient(true, CONFIG.FADE_DUCK_DOWN);
    video.pause(); video.currentTime = start;
    function onSeeked(){
      video.removeEventListener('seeked', onSeeked);
      video.volume = CONFIG.VOL_VIDEO;
      video.play().catch(function(){});
    }
    video.addEventListener('seeked', onSeeked);
  });
});


/* ══════════════════════════════════════════
   TYPING cinématographique
══════════════════════════════════════════ */
function humanDelay(c, prev){
  var r=Math.random, S=1/CONFIG.TYPING_SPEED;
  if(c==='\n')          return (300+r()*240)*S;
  if('…'.includes(c))   return (280+r()*230)*S;
  if('—'.includes(c))   return (180+r()*120)*S;
  if('.!?'.includes(c)) return (120+r()*170)*S;
  if(',;:'.includes(c)) return (75+r()*100)*S;
  if(c===' '){ if(prev&&'.!?,;:'.includes(prev)) return (170+r()*130)*S; return (85+r()*130)*S; }
  var base=(30+r()*50)*S;
  if(r()<0.08)  return base*2.7;
  if(r()<0.035) return base*0.25;
  return base;
}
function typeInto(el, text, onDone){
  el.textContent=''; el.style.opacity='1'; var i=0;
  function next(){
    if(i>=text.length){ if(onDone) onDone(); return; }
    el.textContent += text[i];
    var d = humanDelay(text[i], text[i-1]||'');
    i++; setTimeout(next, d);
  }
  next();
}
function hideEl(el, delay, cb){
  setTimeout(function(){
    el.style.opacity='0';
    setTimeout(function(){ el.textContent=''; if(cb) cb(); }, 800);
  }, delay);
}


/* ══════════════════════════════════════════
   TITRE cinématographique
══════════════════════════════════════════ */
function revealTitle(){
  var el = document.getElementById('site-title');
  var rawParts = CONFIG.TITLE_TEXT.split(' — ');
  var parts = [];
  rawParts.forEach(function(p,i){ parts.push(p); if(i<rawParts.length-1) parts.push('—'); });
  var html = '';
  parts.forEach(function(part,pi){
    if(part==='—'){ html += '<span class="sep">—</span>'; }
    else{ part.split('').forEach(function(ch,ci){ html += '<span class="char" data-i="'+(pi*20+ci)+'">'+(ch===' '?'&nbsp;':ch)+'</span>'; }); }
  });
  el.innerHTML = html;
  el.style.color      = CONFIG.TITLE_COLOR;
  el.style.textShadow = '0 0 18px ' + CONFIG.TITLE_GLOW;
  el.querySelectorAll('.char').forEach(function(span,i){
    setTimeout(function(){ span.style.opacity='1'; span.style.transform='translateY(0)'; },
      CONFIG.TITLE_INITIAL_DELAY + i*CONFIG.TITLE_CHAR_DELAY + Math.random()*25);
  });
  el.querySelectorAll('.sep').forEach(function(sep,i){
    setTimeout(function(){ sep.style.opacity='0.6'; }, CONFIG.TITLE_INITIAL_DELAY+(i+1)*340);
  });
}


/* ══════════════════════════════════════════
   BARRE DE NAVIGATION — SVG animé
══════════════════════════════════════════ */
var _navBarDrawn = false; // garde pour ne pas réanimer au resize

function drawNavBar(animate){
  if(animate === undefined) animate = true;
  var W = window.innerWidth, H = window.innerHeight;
  var h  = Math.max(CONFIG.NAV_MIN_HEIGHT_PX, CONFIG.NAV_HEIGHT * H);
  var w  = CONFIG.NAV_WIDTH  * W;
  var x  = (W - w) / 2;          // centré horizontalement
  var y  = H - CONFIG.NAV_BOTTOM * H - h;
  var sw = CONFIG.NAV_STROKE_WIDTH;
  var sc = CONFIG.NAV_STROKE_COLOR;
  var labels = [CONFIG.NAV_BTN_1, CONFIG.NAV_BTN_2, CONFIG.NAV_BTN_3];
  var N = labels.length;
  var perim = 2 * (w + h);

  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', W); svg.setAttribute('height', H);

  // Fond
  var bg = document.createElementNS(svgNS, 'rect');
  bg.setAttribute('x', x); bg.setAttribute('y', y);
  bg.setAttribute('width', w); bg.setAttribute('height', h);
  bg.setAttribute('fill', CONFIG.NAV_BG);
  svg.appendChild(bg);

  // Rectangle extérieur
  var outerRect = document.createElementNS(svgNS, 'rect');
  outerRect.setAttribute('class', 'nav-rect-path');
  outerRect.setAttribute('x', x); outerRect.setAttribute('y', y);
  outerRect.setAttribute('width', w); outerRect.setAttribute('height', h);
  outerRect.setAttribute('stroke', sc); outerRect.setAttribute('stroke-width', sw);
  outerRect.style.strokeDasharray  = perim;
  outerRect.style.strokeDashoffset = perim;
  outerRect.style.transition = animate ? ('stroke-dashoffset ' + CONFIG.NAV_DRAW_SPEED + 's cubic-bezier(0.4,0,0.2,1) 0s') : 'none';
  svg.appendChild(outerRect);

  // Séparateurs verticaux (1 de moins que N boutons)
  var seps = [];
  for(var i = 1; i < N; i++){
    var sx = x + i * w / N;
    var sep = document.createElementNS(svgNS, 'line');
    sep.setAttribute('class', 'nav-rect-path');
    sep.setAttribute('x1', sx); sep.setAttribute('y1', y);
    sep.setAttribute('x2', sx); sep.setAttribute('y2', y + h);
    sep.setAttribute('stroke', sc); sep.setAttribute('stroke-width', sw);
    sep.style.strokeDasharray  = h;
    sep.style.strokeDashoffset = h;
    var sepT = CONFIG.NAV_DRAW_SPEED + (i - 1) * CONFIG.NAV_SEP_DELAY;
    sep.style.transition = animate ? ('stroke-dashoffset ' + CONFIG.NAV_SEP_SPEED + 's cubic-bezier(0.4,0,0.2,1) ' + sepT + 's') : 'none';
    svg.appendChild(sep);
    seps.push(sep);
  }

  // Textes
  var txts = [];
  labels.forEach(function(label, i){
    var cx  = x + (i + 0.5) * w / N;
    var cy  = y + h / 2;
    var txt = document.createElementNS(svgNS, 'text');
    txt.setAttribute('class', 'nav-btn-label');
    txt.setAttribute('x', cx); txt.setAttribute('y', cy);
    txt.setAttribute('fill', CONFIG.NAV_BTN_COLOR);
    txt.setAttribute('font-family', CONFIG.NAV_BTN_FONT_FAMILY);
    // Taille de police : commence par h * ratio, sera ajustée après injection dans le DOM
    txt.setAttribute('font-size', Math.round(h * CONFIG.NAV_BTN_FONT_RATIO) + 'px');
    txt.setAttribute('letter-spacing', CONFIG.NAV_BTN_LETTER_SPACING);
    txt.textContent = label;
    var txtT = CONFIG.NAV_DRAW_SPEED + i * CONFIG.NAV_SEP_DELAY + CONFIG.NAV_TEXT_DELAY;
    txt.style.opacity    = '0';
    txt.style.transition = animate ? ('opacity ' + CONFIG.NAV_TEXT_FADE + 's ease ' + txtT + 's') : 'none';
    svg.appendChild(txt);
    txts.push(txt);

    // Zone hover/clic transparente
    var zone = document.createElementNS(svgNS, 'rect');
    zone.setAttribute('class', 'nav-btn-zone');
    zone.setAttribute('x', x + i * w / N);
    zone.setAttribute('y', y);
    zone.setAttribute('width', w / N); zone.setAttribute('height', h);
    zone.setAttribute('fill', 'transparent');
    zone.addEventListener('mouseenter', function(){ txt.setAttribute('fill', CONFIG.NAV_BTN_COLOR_HOVER); });
    zone.addEventListener('mouseleave', function(){ txt.setAttribute('fill', CONFIG.NAV_BTN_COLOR); });
    zone.addEventListener('click', function(){ console.log('Nav clic:', label); });
    svg.appendChild(zone);
  });

  // Injecter dans le DOM
  var bar = document.getElementById('nav-bar');
  bar.innerHTML = '';
  bar.style.width  = W + 'px';
  bar.style.height = H + 'px';
  bar.appendChild(svg);

  // Police unifiée : on cherche la taille qui fait tenir le texte le plus long,
  // puis on applique cette même taille à tous les boutons (cohérence esthétique)
  var cellW = w / N;
  var padding = cellW * 0.10; // 10% de marge de chaque côté
  var maxW = cellW - padding * 2;
  var unifiedFs = parseFloat(txts[0].getAttribute('font-size')); // taille de départ
  // 1. Trouver la taille minimale qui fait tenir chaque texte
  txts.forEach(function(txt){
    var fs = unifiedFs;
    while(txt.getComputedTextLength() > maxW && fs > 6){
      fs -= 0.5;
      txt.setAttribute('font-size', fs + 'px');
    }
    if(fs < unifiedFs) unifiedFs = fs;
  });
  // 2. Appliquer cette taille à tous pour l'uniformité
  txts.forEach(function(txt){
    txt.setAttribute('font-size', unifiedFs + 'px');
  });

  // Déclencher les animations (ou affichage immédiat au resize)
  if(animate){
    setTimeout(function(){
      outerRect.style.strokeDashoffset = '0';
      seps.forEach(function(s){ s.style.strokeDashoffset = '0'; });
      txts.forEach(function(t){ t.style.opacity = '1'; });
    }, 40);
  } else {
    outerRect.style.strokeDashoffset = '0';
    seps.forEach(function(s){ s.style.strokeDashoffset = '0'; });
    txts.forEach(function(t){ t.style.opacity = '1'; });
  }
  _navBarDrawn = true;
}

// Redessiner sans animation au redimensionnement si la barre est déjà visible
window.addEventListener('resize', function(){
  if(_navBarDrawn) drawNavBar(false);
});

/* ══════════════════════════════════════════
   SÉQUENCE PRINCIPALE
══════════════════════════════════════════ */
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement
          || document.mozFullScreenElement || document.msFullscreenElement);
}
function enterFullscreen(){
  var el = document.documentElement;
  if     (el.requestFullscreen)       el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen)    el.mozRequestFullScreen();
  else if(el.msRequestFullscreen)     el.msRequestFullscreen();
}
function leaveFullscreen(){
  if     (document.exitFullscreen)       document.exitFullscreen();
  else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  else if(document.mozCancelFullScreen)  document.mozCancelFullScreen();
  else if(document.msExitFullscreen)     document.msExitFullscreen();
}

function syncFsButton(){
  var fs = isFullscreen();
  document.getElementById('icon-fs-enter').style.display = fs ? 'none'  : 'block';
  document.getElementById('icon-fs-exit').style.display  = fs ? 'block' : 'none';
  document.getElementById('btn-fs').title = fs ? 'Quitter le plein écran' : 'Plein écran';
}
document.addEventListener('fullscreenchange',       syncFsButton);
document.addEventListener('webkitfullscreenchange', syncFsButton);
document.addEventListener('mozfullscreenchange',    syncFsButton);
document.addEventListener('MSFullscreenChange',     syncFsButton);

document.getElementById('btn-fs').addEventListener('click', function(){
  if(isFullscreen()) leaveFullscreen(); else enterFullscreen();
});

/* Bloquer le menu contextuel sur la vidéo */
document.getElementById('bgVideo').addEventListener('contextmenu', function(e){ e.preventDefault(); });

function startExperience(){
  if(experienceStarted) return;
  experienceStarted = true;
  startScreen.style.display = 'none';
  enterFullscreen();

  revealTitle();
  startPublicLoop();
  loadBuffer('chuchotement.wav').then(function(buf){ whisperBuffer=buf; scheduleWhispers(); });

  setTimeout(function(){
    var sub4 = document.getElementById('subtitle-4');

    fadeInNarr(sndPerturbe, CONFIG.FADE_NARR_IN, CONFIG.VOL_PERTURBE);
    typeInto(sub1, CONFIG.SUBTITLE_TEXT_1, function(){
      growTorch(CONFIG.TORCH_RADIUS, CONFIG.TORCH_GROW_DURATION);
      /* hint supprimé */
      setTimeout(function(){ fadeOutEl(sndPerturbe, CONFIG.FADE_NARR_OUT); }, 500);

      hideEl(sub1, CONFIG.SUBTITLE_HOLD_1, function(){
        setTimeout(function(){
          fadeInNarr(sndCandice, CONFIG.FADE_NARR_IN, CONFIG.VOL_CANDICE);
          typeInto(sub2, CONFIG.SUBTITLE_TEXT_2, function(){
            setTimeout(function(){ fadeOutEl(sndCandice, CONFIG.FADE_NARR_OUT); }, 900);
            hideEl(sub2, CONFIG.SUBTITLE_HOLD_2, function(){
              drawNavBar();

              setTimeout(function(){
                fadeInNarr(sndDelicat, CONFIG.FADE_NARR_IN, CONFIG.VOL_DELICAT);
                typeInto(sub3, CONFIG.SUBTITLE_TEXT_3, function(){
                  setTimeout(function(){ fadeOutEl(sndDelicat, CONFIG.FADE_NARR_OUT); }, 1000);
                  hideEl(sub3, CONFIG.SUBTITLE_HOLD_3, function(){
                    setTimeout(function(){
                      fadeInNarr(sndPratique, CONFIG.FADE_NARR_IN, CONFIG.VOL_PRATIQUE);
                      typeInto(sub4, CONFIG.SUBTITLE_TEXT_4, function(){
                        setTimeout(function(){ fadeOutEl(sndPratique, CONFIG.FADE_NARR_OUT); }, 1000);
                        hideEl(sub4, CONFIG.SUBTITLE_HOLD_4, null);
                      });
                    }, CONFIG.SILENCE_BETWEEN_3_4);
                  });
                });
              }, CONFIG.SILENCE_BETWEEN_2_3);
            });
          });
        }, CONFIG.SILENCE_BETWEEN_1_2);
      });
    });
  }, CONFIG.SILENCE_BEFORE_SEQ);
}

startScreen.addEventListener('click',   startExperience);
startScreen.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' ') startExperience(); });


/* ══════════════════════════════════════════
   PORTRAIT — pause/reprise audio (mobile)
══════════════════════════════════════════ */
if(window.screen && window.screen.orientation){
  window.screen.orientation.addEventListener('change', handleOrientationChange);
} else {
  window.addEventListener('orientationchange', handleOrientationChange);
}
function handleOrientationChange(){
  var isPortrait = window.matchMedia('(orientation: portrait)').matches;
  var video = document.getElementById('bgVideo');
  var audios = document.querySelectorAll('audio');
  if(isPortrait){
    /* Suspendre le contexte Web Audio (public loop, whispers, voix narratives) */
    if(audioCtx) audioCtx.suspend();
    /* Mettre en pause les <audio> HTML */
    audios.forEach(function(a){ if(!a.paused) { a._wasPlaying = true; a.pause(); } });
    /* Mettre en pause la vidéo */
    if(video && !video.paused){ video._wasPlaying = true; video.pause(); }
  } else {
    /* Reprendre tout au retour en paysage */
    if(audioCtx) audioCtx.resume();
    audios.forEach(function(a){ if(a._wasPlaying){ a._wasPlaying = false; a.play().catch(function(){}); } });
    if(video && video._wasPlaying){ video._wasPlaying = false; video.play().catch(function(){}); }
  }
}


/* ══════════════════════════════════════════
   TOUCH — mobile uniquement
   • touchmove → déplace la torche
   • tap court  → test ellipse visages, sinon clic DOM
   • btn-fs     → son propre handler pour éviter les conflits
══════════════════════════════════════════ */
var _isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

if(_isTouchDevice){

  /* Le bouton FS doit stopper la propagation pour ne pas
     déclencher le touchmove de la torche */
  document.getElementById('btn-fs').addEventListener('touchend', function(e){
    e.preventDefault();
    e.stopPropagation();
    if(isFullscreen()) leaveFullscreen(); else enterFullscreen();
  }, { passive: false });

  var _txStart = 0, _tyStart = 0, _ttStart = 0, _trafPending = false;

  document.addEventListener('touchstart', function(e){
    var t = e.touches[0];
    _txStart = t.clientX; _tyStart = t.clientY; _ttStart = Date.now();
    mouseX = t.clientX; mouseY = t.clientY;
    cursorEl.style.left = mouseX + 'px';
    cursorEl.style.top  = mouseY + 'px';
    updateFaceHover();
  }, { passive: true });

  document.addEventListener('touchmove', function(e){
    e.preventDefault();
    var t = e.touches[0];
    mouseX = t.clientX; mouseY = t.clientY;
    cursorEl.style.left = mouseX + 'px';
    cursorEl.style.top  = mouseY + 'px';
    if(!_trafPending){
      _trafPending = true;
      requestAnimationFrame(function(){
        _trafPending = false;
        updateFaceHover();
      });
    }
  }, { passive: false });

  document.addEventListener('touchend', function(e){
    var t  = e.changedTouches[0];
    var dx = t.clientX - _txStart, dy = t.clientY - _tyStart;
    var dur = Date.now() - _ttStart;
    if(Math.sqrt(dx*dx + dy*dy) < 14 && dur < 260){
      var tapX = t.clientX, tapY = t.clientY;
      /* Test ellipse visages — priorité et tolérance +50% pour le doigt */
      var hitFace = false;
      if(torchBaseRadius > 5){
        var faceKeys = Object.keys(FACES);
        for(var k = 0; k < faceKeys.length; k++){
          var face = FACES[faceKeys[k]];
          var vr  = getVideoRect();
          var fcx = vr.x + face.xPct * vr.w;
          var fcy = vr.y + face.yPct * vr.h;
          var frx = face.rx * vr.w * 1.5;
          var fry = face.ry * vr.h * 1.5;
          var fdx = (tapX - fcx) / frx, fdy = (tapY - fcy) / fry;
          if(fdx*fdx + fdy*fdy <= 1.0){
            var hsId = (faceKeys[k] === 'caleb') ? 'face-L2-3' : 'face-L2-6';
            var hs = document.getElementById(hsId);
            if(hs) hs.dispatchEvent(new MouseEvent('click', { bubbles:true, cancelable:true }));
            hitFace = true; break;
          }
        }
      }
      /* Sinon clic DOM classique (startScreen, nav, etc.) */
      if(!hitFace){
        var target = document.elementFromPoint(tapX, tapY);
        if(target && target.id !== 'btn-fs')
          target.dispatchEvent(new MouseEvent('click', { bubbles:true, cancelable:true, clientX:tapX, clientY:tapY }));
      }
    }
  }, { passive: true });

}
